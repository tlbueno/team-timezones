<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Team Timezones</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Modern Color Palette */
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            --time-night: #1e293b;
            --time-night-text: #94a3b8;
            --time-evening: #f0f9ff;
            --time-evening-text: #0284c7;
            --time-work: #ffffff;
            --time-work-text: #0f172a;
            
            --now-highlight: #eef2ff;
            --now-border: #6366f1;
            --hover-bg: #fef3c7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            padding: 40px 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            max-width: 1400px;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 4px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        /* Custom Scrollbar */
        .container::-webkit-scrollbar {
            height: 10px;
        }
        .container::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }
        .container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 20px 8px 12px 8px;
            width: 65px; /* Slightly wider to comfortably fit 00:00 */
            font-size: 13px;
            font-weight: 500;
            position: relative;
            transition: background-color 0.15s ease;
        }

        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 16px 8px;
            border-top: none;
        }

        /* Sticky Left Column */
        .name-cell {
            text-align: left;
            width: 280px;
            min-width: 280px;
            background-color: var(--bg-card);
            position: sticky;
            left: 0;
            z-index: 10;
            border-right: 2px solid var(--border);
            padding-left: 24px;
            padding-top: 16px;
        }
        
        .name-cell::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 0;
            bottom: 0;
            width: 6px;
            background: linear-gradient(to right, rgba(0,0,0,0.03), transparent);
        }

        .person-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
        }

        .tz-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 6px;
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .live-time {
            display: block;
            font-size: 15px;
            color: #4f46e5;
            margin-top: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Timeline States */
        .past { opacity: 0.4; }
        .night { background-color: var(--time-night); color: var(--time-night-text); }
        .evening { background-color: var(--time-evening); color: var(--time-evening-text); }
        .work { background-color: var(--time-work); color: var(--time-work-text); }

        /* Modern Day Badge */
        .day-marker {
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
            z-index: 2;
            padding: 2px 6px;
            border-radius: 12px;
            text-transform: uppercase;
        }
        
        .night .day-marker { background: rgba(255,255,255,0.1); color: #e2e8f0; }
        .evening .day-marker { background: #bae6fd; color: #0369a1; }
        .work .day-marker { background: #f1f5f9; color: #475569; }

        /* Current Hour Spotlight */
        .current-hour-header {
            background-color: var(--now-highlight) !important;
            color: var(--now-border) !important;
            border-top: 3px solid var(--now-border) !important;
        }
        .current-hour-cell {
            background-color: #fafafa;
            border-left: 2px solid var(--now-border) !important;
            border-right: 2px solid var(--now-border) !important;
            font-weight: 700;
            box-shadow: inset 0 0 12px rgba(99, 102, 241, 0.08);
        }

        /* Hover Effect */
        .hover-col {
            background-color: var(--hover-bg) !important;
            color: #b45309 !important;
            cursor: crosshair;
        }
        .hover-col .day-marker {
            background: #fde68a;
            color: #92400e;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>Global Team Timezones</h1>
            <p>Syncing working hours across timezones</p>
        </div>
    </div>

    <div class="container">
        <table>
            <thead>
                <tr id="header-row">
                    <th class="name-cell" style="border-top-left-radius: 16px;">Team Member</th>
                    </tr>
            </thead>
            <tbody id="team-body">
                </tbody>
        </table>
    </div>

    <script>
        // --- CONFIGURATION ---
        const team = [
            { name: "CET / CEST", tz: "Europe/Paris" },
            { name: "Angel / Rolv", tz: "Europe/Dublin" },
            { name: "UTC", tz: "UTC" },
            { name: "Renata / Tiago / Yasmin", tz: "America/Sao_Paulo" },
            { name: "Steven", tz: "America/New_York" },
            { name: "Michael", tz: "America/Denver" },
            { name: "Ash", tz: "America/Los_Angeles" },
        ];

        const PAST_HOURS = 2;
        const TOTAL_COLUMNS = 24;

        // --- GRID RENDERING ---
        function updateGrid() {
            const headerRow = document.getElementById('header-row');
            const teamBody = document.getElementById('team-body');
            
            while (headerRow.children.length > 1) headerRow.removeChild(headerRow.lastChild);
            teamBody.innerHTML = '';

            const now = new Date();

            // Headers
            for (let i = -PAST_HOURS; i < (TOTAL_COLUMNS - PAST_HOURS); i++) {
                const th = document.createElement('th');
                if (i === 0) {
                    th.innerText = "NOW";
                    th.classList.add('current-hour-header');
                } else if (i < 0) {
                    th.innerText = `${i}h`;
                    th.classList.add('past');
                } else {
                    th.innerText = `+${i}h`;
                }
                headerRow.appendChild(th);
            }

            // Body
            team.forEach((person, index) => {
                const tr = document.createElement('tr');
                
                const nameTd = document.createElement('td');
                nameTd.className = "name-cell";
                nameTd.innerHTML = `
                    <span class="person-name">${person.name}</span> 
                    <span class="tz-label">${getShortTZ(person.tz)}</span>
                    <span class="live-time" id="clock-${index}">--:--:--</span>
                `;
                tr.appendChild(nameTd);

                for (let i = -PAST_HOURS; i < (TOTAL_COLUMNS - PAST_HOURS); i++) {
                    const targetTime = new Date(now.getTime() + (i * 60 * 60 * 1000));
                    
                    // Formatted as 24-hour e.g., "14:00"
                    const hourLabel = new Intl.DateTimeFormat('en-US', {
                        hour: '2-digit', minute: '2-digit', hour12: false, timeZone: person.tz
                    }).format(targetTime);

                    const hour24 = parseInt(new Intl.DateTimeFormat('en-US', {
                        hour: 'numeric', hour12: false, timeZone: person.tz
                    }).format(targetTime));

                    const td = document.createElement('td');
                    td.dataset.colIndex = i + PAST_HOURS;

                    let dayMarkerHTML = "";
                    if (hour24 === 0 || i === -PAST_HOURS) {
                        const dayString = new Intl.DateTimeFormat('en-US', {
                            weekday: 'short', month: 'short', day: 'numeric', timeZone: person.tz
                        }).format(targetTime);
                        dayMarkerHTML = `<div class="day-marker">${dayString}</div>`;
                    }

                    td.innerHTML = `${dayMarkerHTML}${hourLabel}`;

                    if (i < 0) td.classList.add('past');
                    if (i === 0) td.classList.add('current-hour-cell');

                    if (hour24 >= 9 && hour24 < 18) td.classList.add('work');
                    else if ((hour24 >= 6 && hour24 < 9) || (hour24 >= 18 && hour24 < 22)) td.classList.add('evening');
                    else td.classList.add('night');

                    tr.appendChild(td);
                }
                teamBody.appendChild(tr);
            });

            setupHoverEffect();
            updateLiveClocks();
        }

        // --- TICKING CLOCKS ---
        function updateLiveClocks() {
            const now = new Date();
            team.forEach((person, index) => {
                const clockSpan = document.getElementById(`clock-${index}`);
                if (clockSpan) {
                    // Formatted as 24-hour e.g., "14:30:45"
                    const timeString = new Intl.DateTimeFormat('en-US', {
                        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: person.tz
                    }).format(now);
                    clockSpan.innerText = timeString; 
                }
            });
        }

        function getShortTZ(tz) {
            try {
                return new Intl.DateTimeFormat('en-US', {timeZoneName: 'short', timeZone: tz})
                    .formatToParts(new Date())
                    .find(p => p.type === 'timeZoneName').value;
            } catch(e) { return tz.split('/')[1] || tz; }
        }

        // --- HOVER EFFECTS ---
        function setupHoverEffect() {
            const table = document.querySelector('table');
            const newTable = table.cloneNode(true);
            table.parentNode.replaceChild(newTable, table);
            
            newTable.addEventListener('mouseover', function(e) {
                const td = e.target.closest('td');
                if (td && !td.classList.contains('name-cell')) {
                    const colIndex = td.dataset.colIndex;
                    newTable.querySelectorAll(`td[data-col-index="${colIndex}"]`).forEach(c => c.classList.add('hover-col'));
                }
            });
            newTable.addEventListener('mouseout', function(e) {
                const td = e.target.closest('td');
                if (td && !td.classList.contains('name-cell')) {
                    const colIndex = td.dataset.colIndex;
                    newTable.querySelectorAll(`td[data-col-index="${colIndex}"]`).forEach(c => c.classList.remove('hover-col'));
                }
            });
        }

        updateGrid();
        setInterval(updateLiveClocks, 1000); 
        setInterval(updateGrid, 60000); 
    </script>
</body>
</html>
